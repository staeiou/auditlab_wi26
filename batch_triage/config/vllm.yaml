vllm:
  # ===========================================================================
  # MODE A: HTTP Client to a Running vLLM Server (Async I/O)
  # ===========================================================================
  # USE THIS MODE IF: You have a separate, long-lived vLLM server running
  # (e.g., via `vllm serve`), and this script will send HTTP requests to it.
  # ---------------------------------------------------------------------------
  # Configuration for the HTTP client (used by the old async script)
  base_url: "http://localhost:8000/v1"   # URL of your running vLLM server
  api_key: "EMPTY"                       # vLLM usually ignores this
  endpoint: "/chat/completions"          # API endpoint to call
  max_concurrent_requests: 8             # Client-side connection limit
  request_timeout_seconds: 120           # Timeout per request
  retry:
    max_attempts: 3                      # Retry failed requests
    backoff_seconds: 2

  # ===========================================================================
  # MODE B: Offline Batch Runner (Recommended for your k8s pod)
  # ===========================================================================
  # USE THIS MODE IF: You want the script to load the model and process the
  # JSONL file directly for maximum throughput (uses vLLM's run_batch).
  # ---------------------------------------------------------------------------
  # Configuration for the offline batch runner (used by the new run_vllm_job.py)
  # batch_url: "/v1/chat/completions"    # Endpoint format for the batch file
  # run_batch_extra_args:
  #   - "--dtype"
  #   - "auto"
  #   - "--gpu-memory-utilization"
  #   - "0.90"
  #   - "--tensor-parallel-size"
  #   - "1"                    # SET THIS TO YOUR POD'S GPU COUNT (e.g., 2 for 2xA100)
  #   - "--enable-force-include-usage"
  # 
  # # Pipeline Hygiene (Recommended defaults)
  # keep_intermediates: false             # Delete temp files after run
  # upload_intermediates_to_wandb: false  # Don't clutter W&B with temp files
